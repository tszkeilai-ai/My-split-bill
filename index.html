<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人多場景記賬分賬系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            // 1. 基礎設定：參與者列表
            const [members, setMembers] = useState(['小明', '小紅', '阿華']);
            const [newMemberName, setNewMemberName] = useState('');

            // 2. 核心數據：多場景記賬
            const [scenes, setScenes] = useState([
                {
                    id: 'scene-1',
                    name: '午餐 - 火鍋',
                    shares: { '小明': 1, '小紅': 1, '阿華': 1 }, // 人頭數
                    items: [
                        { id: 'item-1', name: '肉盤與菜盤', amount: 1200, paidBy: '小明' },
                        { id: 'item-2', name: '飲料', amount: 150, paidBy: '小紅' }
                    ]
                }
            ]);

            // 新增成員
            const handleAddMember = (e) => {
                e.preventDefault();
                if (!newMemberName.trim()) return;
                if (members.includes(newMemberName.trim())) {
                    alert('成員名稱已存在！');
                    return;
                }
                const name = newMemberName.trim();
                setMembers([...members, name]);
                // 同步更新所有場景，預設新成員人頭數為 1
                setScenes(scenes.map(scene => ({
                    ...scene,
                    shares: { ...scene.shares, [name]: 1 }
                })));
                setNewMemberName('');
            };

            // 刪除成員
            const handleRemoveMember = (name) => {
                if (members.length <= 1) {
                    alert('至少需要保留一位成員！');
                    return;
                }
                setMembers(members.filter(m => m !== name));
                // 同步刪除場景中的該成員數據
                setScenes(scenes.map(scene => {
                    const nextShares = { ...scene.shares };
                    delete nextShares[name];
                    const nextItems = scene.items.map(item => 
                        item.paidBy === name ? { ...item, paidBy: members.find(m => m !== name) || '' } : item
                    );
                    return { ...scene, shares: nextShares, items: nextItems };
                }));
            };

            // 新增場景
            const handleAddScene = () => {
                const defaultShares = {};
                members.forEach(m => defaultShares[m] = 1);
                const newScene = {
                    id: `scene-${Date.now()}`,
                    name: `新活動場景 ${scenes.length + 1}`,
                    shares: defaultShares,
                    items: [{ id: `item-${Date.now()}`, name: '項目1', amount: 0, paidBy: members[0] || '' }]
                };
                setScenes([...scenes, newScene]);
            };

            // 刪除場景
            const handleRemoveScene = (sceneId) => {
                if (scenes.length <= 1) {
                    alert('至少需保留一個場景！');
                    return;
                }
                setScenes(scenes.filter(s => s.id !== sceneId));
            };

            // 更新場景名稱
            const handleSceneNameChange = (sceneId, val) => {
                setScenes(scenes.map(s => s.id === sceneId ? { ...s, name: val } : s));
            };

            // 更新個人權重人頭數
            const handleShareChange = (sceneId, member, val) => {
                const num = val === '' ? 0 : Math.max(0, parseFloat(val) || 0);
                setScenes(scenes.map(s => s.id === sceneId ? {
                    ...s,
                    shares: { ...s.shares, [member]: num }
                } : s));
            };

            // 新增消費項目
            const handleAddItem = (sceneId) => {
                setScenes(scenes.map(s => s.id === sceneId ? {
                    ...s,
                    items: [...s.items, { id: `item-${Date.now()}`, name: '', amount: 0, paidBy: members[0] || '' }]
                } : s));
            };

            // 更新消費項目欄位
            const handleItemChange = (sceneId, itemId, field, val) => {
                setScenes(scenes.map(s => {
                    if (s.id !== sceneId) return s;
                    return {
                        ...s,
                        items: s.items.map(item => {
                            if (item.id !== itemId) return item;
                            if (field === 'amount') {
                                return { ...item, amount: val === '' ? 0 : Math.max(0, parseFloat(val) || 0) };
                            }
                            return { ...item, [field]: val };
                        })
                    };
                }));
            };

            // 刪除消費項目
            const handleRemoveItem = (sceneId, itemId) => {
                setScenes(scenes.map(s => {
                    if (s.id !== sceneId) return s;
                    if (s.items.length <= 1) {
                        alert('每個場景至少要有一個消費項目！');
                        return s;
                    }
                    return { ...s, items: s.items.filter(i => i.id !== itemId) };
                }));
            };

            // ================= 核心計算邏輯 =================
            const processedScenes = useMemo(() => {
                return scenes.map(scene => {
                    // 1. 項目總金額
                    const totalAmount = scene.items.reduce((sum, item) => sum + item.amount, 0);
                    
                    // 2. 總參與人頭數
                    const totalShares = Object.values(scene.shares).reduce((sum, val) => sum + val, 0);
                    
                    // 3. 平均每位應付 (防呆除以 0)
                    const avgPerShare = totalShares > 0 ? totalAmount / totalShares : 0;

                    // 計算每個人在此場景的「已付」與「應付」
                    const memberBreakdown = {};
                    members.forEach(m => {
                        const paid = scene.items.reduce((sum, item) => item.paidBy === m ? sum + item.amount : sum, 0);
                        const userShare = scene.shares[m] || 0;
                        const expectedPay = avgPerShare * userShare;
                        const balance = paid - expectedPay; // 正數代表可收回，負數代表需補錢

                        memberBreakdown[m] = {
                            share: userShare,
                            paid: paid,
                            expectedPay: expectedPay,
                            balance: balance
                        };
                    });

                    return {
                        ...scene,
                        totalAmount,
                        totalShares,
                        avgPerShare,
                        memberBreakdown
                    };
                });
            }, [scenes, members]);

            // 4. 最終總結算 (Total Summary)
            const totalSummary = useMemo(() => {
                const summary = {};
                members.forEach(m => {
                    summary[m] = { totalPaid: 0, totalExpected: 0, finalBalance: 0 };
                });

                processedScenes.forEach(scene => {
                    members.forEach(m => {
                        if (scene.memberBreakdown[m]) {
                            summary[m].totalPaid += scene.memberBreakdown[m].paid;
                            summary[m].totalExpected += scene.memberBreakdown[m].expectedPay;
                            summary[m].finalBalance += scene.memberBreakdown[m].balance;
                        }
                    });
                });

                return summary;
            }, [processedScenes, members]);

            // 5. 導出 PDF 功能
            const exportToPDF = () => {
                const element = document.getElementById('report-content');
                const opt = {
                    margin:       10,
                    filename:     `分帳結算報告_${new Date().toISOString().slice(0,10)}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div class="max-w-6xl mx-auto px-4 py-8">
                    {/* Header */}
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-6 mb-8 gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                                <i class="fa-solid font-sm text-indigo-600 fa-calculator"></i> 多人多場景記賬分賬系統
                            </h1>
                            <p class="text-sm text-slate-500 mt-1">獨立管理多個活動場景，即時精準結算差額。</p>
                        </div>
                        <button 
                            onClick={exportToPDF}
                            class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 cursor-pointer text-sm"
                        >
                            <i class="fa-solid fa-file-pdf"></i> 導出 PDF 報告
                        </button>
                    </div>

                    {/* 可列印與導出的區塊 */}
                    <div id="report-content" class="space-y-8">
                        
                        {/* 1. 基礎設定面板 */}
                        <div class="bg-white rounded-2xl border border-slate-200/80 p-6 shadow-xs">
                            <h2 class="text-lg font-semibold text-slate-900 mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-users text-slate-400"></i> 1. 參與成員設定
                            </h2>
                            <form onSubmit={handleAddMember} class="flex flex-wrap gap-2 mb-4">
                                <input 
                                    type="text" 
                                    placeholder="輸入成員名稱 (例如: A, B, C)" 
                                    value={newMemberName}
                                    onChange={(e) => setNewMemberName(e.target.value)}
                                    class="border border-slate-300 rounded-xl px-4 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500 bg-slate-50/50 w-full sm:w-64"
                                />
                                <button type="submit" class="bg-slate-900 hover:bg-slate-800 text-white font-medium text-sm px-4 py-2 rounded-xl transition-colors cursor-pointer">
                                    + 新增成員
                                </button>
                            </form>
                            
                            <div class="flex flex-wrap gap-2">
                                {members.map(name => (
                                    <span key={name} class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-sm font-medium pl-3 pr-2 py-1.5 rounded-full border border-slate-200">
                                        {name}
                                        <button 
                                            type="button" 
                                            onClick={() => handleRemoveMember(name)}
                                            class="text-slate-400 hover:text-rose-500 transition-colors cursor-pointer"
                                        >
                                            <i class="fa-solid fa-circle-xmark"></i>
                                        </button>
                                    </span>
                                ))}
                            </div>
                        </div>

                        {/* 2. 多場景記賬卡片區域 */}
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
                                    <i class="fa-solid fa-layer-group text-slate-400"></i> 2. 活動場景記賬
                                </h2>
                                <button 
                                    onClick={handleAddScene}
                                    class="border border-indigo-200 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium text-sm px-4 py-2 rounded-xl transition-all cursor-pointer flex items-center gap-1.5"
                                >
                                    <i class="fa-solid fa-folder-plus"></i> 新增活動場景
                                </button>
                            </div>

                            <div class="space-y-6">
                                {processedScenes.map((scene) => (
                                    <div key={scene.id} class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
                                        {/* 卡片標頭 */}
                                        <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                            <div class="flex items-center gap-3 flex-1">
                                                <i class="fa-solid fa-file-invoice-dollar text-indigo-500 text-lg"></i>
                                                <input 
                                                    type="text" 
                                                    value={scene.name} 
                                                    onChange={(e) => handleSceneNameChange(scene.id, e.target.value)}
                                                    class="font-bold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-indigo-500 focus:outline-hidden text-base py-0.5 px-1 w-full max-w-xs transition-colors"
                                                />
                                            </div>
                                            <button 
                                                onClick={() => handleRemoveScene(scene.id)}
                                                class="text-slate-400 hover:text-rose-600 font-medium text-sm transition-colors flex items-center gap-1 cursor-pointer self-end sm:self-auto"
                                            >
                                                <i class="fa-regular fa-trash-can"></i> 刪除此場景
                                            </button>
                                        </div>

                                        <div class="p-6 space-y-6">
                                            {/* 消費項目子表格 */}
                                            <div>
                                                <div class="flex justify-between items-center mb-2">
                                                    <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">消費細項</h3>
                                                    <button 
                                                        onClick={() => handleAddItem(scene.id)}
                                                        class="text-xs text-indigo-600 hover:text-indigo-800 font-medium cursor-pointer"
                                                    >
                                                        + 新增品項
                                                    </button>
                                                </div>
                                                <div class="overflow-x-auto">
                                                    <table class="min-w-full text-sm">
                                                        <thead>
                                                            <tr class="border-b border-slate-100 text-slate-500 text-left">
                                                                <th class="pb-2 font-medium w-1/2">品名</th>
                                                                <th class="pb-2 font-medium w-1/4">金額 (元)</th>
                                                                <th class="pb-2 font-medium w-1/4">誰先墊付</th>
                                                                <th class="pb-2 w-10"></th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100">
                                                            {scene.items.map(item => (
                                                                <tr key={item.id}>
                                                                    <td class="py-2.5 pr-2">
                                                                        <input 
                                                                            type="text" 
                                                                            placeholder="例如: 炒飯、拿鐵..." 
                                                                            value={item.name}
                                                                            onChange={(e) => handleItemChange(scene.id, item.id, 'name', e.target.value)}
                                                                            class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-hidden focus:ring-1 focus:ring-indigo-500"
                                                                        />
                                                                    </td>
                                                                    <td class="py-2.5 pr-2">
                                                                        <input 
                                                                            type="number" 
                                                                            placeholder="0"
                                                                            value={item.amount || ''}
                                                                            onChange={(e) => handleItemChange(scene.id, item.id, 'amount', e.target.value)}
                                                                            class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-hidden focus:ring-1 focus:ring-indigo-500"
                                                                        />
                                                                    </td>
                                                                    <td class="py-2.5 pr-2">
                                                                        <select 
                                                                            value={item.paidBy}
                                                                            onChange={(e) => handleItemChange(scene.id, item.id, 'paidBy', e.target.value)}
                                                                            class="w-full bg-slate-50/50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-hidden focus:ring-1 focus:ring-indigo-500"
                                                                        >
                                                                            {members.map(m => <option key={m} value={m}>{m}</option>)}
                                                                        </select>
                                                                    </td>
                                                                    <td class="py-2.5 text-center">
                                                                        <button 
                                                                            onClick={() => handleRemoveItem(scene.id, item.id)}
                                                                            class="text-slate-300 hover:text-rose-500 cursor-pointer"
                                                                        >
                                                                            <i class="fa-solid fa-xmark"></i>
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            {/* 人頭權重與此場景結算明細 */}
                                            <div class="border-t border-slate-100 pt-4">
                                                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">成員參與人頭數 與 此場景結算</h3>
                                                <div class="overflow-x-auto">
                                                    <table class="min-w-full text-sm text-left">
                                                        <thead>
                                                            <tr class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                                                                <th class="p-2.5 rounded-l-lg">成員</th>
                                                                <th class="p-2.5 w-24">人頭數</th>
                                                                <th class="p-2.5 text-right">已付款</th>
                                                                <th class="p-2.5 text-right">應付金額</th>
                                                                <th class="p-2.5 text-right rounded-r-lg">差額</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100">
                                                            {members.map(m => {
                                                                const bd = scene.memberBreakdown[m] || { share: 0, paid: 0, expectedPay: 0, balance: 0 };
                                                                return (
                                                                    <tr key={m} class="hover:bg-slate-50/40">
                                                                        <td class="p-2.5 font-medium text-slate-700">{m}</td>
                                                                        <td class="p-2.5">
                                                                            <input 
                                                                                type="number" 
                                                                                step="0.1"
                                                                                placeholder="0"
                                                                                value={bd.share}
                                                                                onChange={(e) => handleShareChange(scene.id, m, e.target.value)}
                                                                                class="w-16 bg-white border border-slate-200 rounded-md px-1.5 py-1 text-center text-sm focus:outline-hidden focus:ring-1 focus:ring-indigo-500"
                                                                            />
                                                                        </td>
                                                                        <td class="p-2.5 text-right text-slate-600">${bd.paid.toFixed(1)}</td>
                                                                        <td class="p-2.5 text-right text-slate-600">${bd.expectedPay.toFixed(1)}</td>
                                                                        <td class={`p-2.5 text-right font-semibold ${bd.balance >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                                            {bd.balance >= 0 ? `+${bd.balance.toFixed(1)}` : bd.balance.toFixed(1)}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            {/* 場景統計小結 */}
                                            <div class="bg-indigo-50/50 rounded-xl p-4 flex flex-wrap justify-between items-center gap-4 text-sm text-indigo-900 border border-indigo-100/50">
                                                <div>
                                                    <span class="font-medium">項目總金額：</span>
                                                    <span class="text-base font-bold text-indigo-700">${scene.totalAmount.toFixed(1)}</span>
                                                </div>
                                                <div>
                                                    <span class="font-medium">總人頭數：</span>
                                                    <span class="text-base font-bold text-indigo-700">{scene.totalShares}</span>
                                                </div>
                                                <div>
                                                    <span class="font-medium">平均每人頭應付：</span>
                                                    <span class="text-base font-bold text-indigo-700">${scene.avgPerShare.toFixed(1)}</span>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 3. 最終總結算面版 (Total Summary) */}
                        <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-xl">
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-400">
                                <i class="fa-solid fa-receipt"></i> 3. 最終總結算 (Total Summary)
                            </h2>
                            <p class="text-xs text-slate-400 mb-4">整合以上所有活動場景的加總報告：</p>
                            
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left">
                                    <thead>
                                        <tr class="border-b border-slate-700 text-slate-400 font-medium">
                                            <th class="pb-3">成員</th>
                                            <th class="pb-3 text-right">總已付金額</th>
                                            <th class="pb-3 text-right">總應付金額</th>
                                            <th class="pb-3 text-right">最終結算 (應收/應付)</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-800">
                                        {members.map(m => {
                                            const sum = totalSummary[m] || { totalPaid: 0, totalExpected: 0, finalBalance: 0 };
                                            return (
                                                <tr key={m} class="hover:bg-slate-800/50">
                                                    <td class="py-3.5 font-semibold text-slate-200 text-base">{m}</td>
                                                    <td class="py-3.5 text-right text-slate-300">${sum.totalPaid.toFixed(1)}</td>
                                                    <td class="py-3.5 text-right text-slate-300">${sum.totalExpected.toFixed(1)}</td>
                                                    <td class="py-3.5 text-right text-base font-bold">
                                                        {sum.finalBalance > 0 ? (
                                                            <span class="text-emerald-400">可收回 +${sum.finalBalance.toFixed(1)}</span>
                                                        ) : sum.finalBalance < 0 ? (
                                                            <span class="text-rose-400">需補繳 ${sum.finalBalance.toFixed(1)}</span>
                                                        ) : (
                                                            <span class="text-slate-400">$0.0 (已清)</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
